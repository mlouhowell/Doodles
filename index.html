<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doodles</title>
  <link rel="icon" type="image/svg+xml" href="logo/Favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Lora';
      src: url('Lora/Lora-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'Lora';
      src: url('Lora/Lora-Italic-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: italic;
    }
    @font-face {
      font-family: 'Space Mono';
      src: url('Space_Mono/SpaceMono-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Space Mono';
      src: url('Space_Mono/SpaceMono-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }

    #scene { position: fixed; top: 0; left: 0; right: 320px; bottom: 0; perspective-origin: 50% 50%; }
    #world { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; }

    .particle {
      position: absolute;
      will-change: transform, opacity;
      transform-origin: center center;
      user-select: none;
    }
    .particle img { width: 100%; height: auto; display: block; }

    /* ── header ── */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 300;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0 0 20px;
      border-bottom: 1px solid #000;
      background: #fff;
    }
    #header-about {
      background: none;
      border: none;
      cursor: pointer;
      font: 14px/1 'IBM Plex Sans', sans-serif;
      color: #000;
      padding: 0;
    }
    #header-about:hover { opacity: 0.5; }
    #header-center {
      position: absolute;
      left: calc((100% - 320px) / 2);
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #header-center img { height: 28px; width: auto; display: block; }
    #header-favicon { height: 20px !important; }
    #header-right {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 320px;
      padding: 0 16px;
      border-left: 1px solid #000;
      height: 100%;
    }
    #header span { font: 14px/1 'IBM Plex Sans', sans-serif; }

    /* ── gen panel ── */
    #gen-panel {
      position: fixed;
      top: 56px;
      right: 0;
      bottom: 0;
      z-index: 200;
      width: 320px;
      background: #fff;
      border-left: 1px solid #000;
      transform: translateY(-100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    #gen-panel.open { transform: translateY(0); }

    /* ── input row ── */
    #gen-input-row {
      display: flex;
      padding: 20px 16px;
      flex-shrink: 0;
    }
    #subject {
      width: 100%;
      min-width: 0;
      min-height: 120px;
      border: none;
      outline: none;
      font: 28px/1.35 'Lora', serif;
      color: #000;
      background: transparent;
      resize: none;
      overflow: hidden;
    }
    #subject::placeholder { color: #bbb; }
    #gen-close {
      position: absolute;
      right: 16px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #000;
      display: flex;
      align-items: center;
    }
    #header-right.closed {
      background: #000;
      cursor: pointer;
    }
    #header-right.closed span { color: #fff; }
    #header-right.closed #gen-close { display: none; }

    #btn-generate {
      margin: 0 16px;
      padding: 14px 16px;
      background: #f0f0f0;
      color: #aaa;
      border: none;
      font: 13px/1 'IBM Plex Sans', sans-serif;
      letter-spacing: 0.02em;
      cursor: default;
      flex-shrink: 0;
      text-align: center;
      border-radius: 0;
    }
    #btn-generate.ready {
      background: #000;
      color: #fff;
      border-top-color: #000;
      cursor: pointer;
    }

    #gen-status {
      padding: 10px 16px;
      font: 11px/1.4 'IBM Plex Sans', sans-serif;
      color: #aaa;
      min-height: 14px;
    }
    #gen-status.err { color: #e05252; }

    /* ── preview ── */
    #gen-preview {
      display: none;
      flex-direction: column;
      padding: 0 16px 20px;
      flex-shrink: 0;
    }
    #gen-preview.visible { display: flex; }

    #preview-canvas, #preview-img {
      width: 100%;
      display: block;
      image-rendering: pixelated;
    }
    #preview-img { display: none; }

    #preview-actions {
      display: none;
      gap: 8px;
      margin-top: 12px;
      padding: 0 16px 20px;
    }
    #preview-actions.visible { display: flex; }

    #btn-add, #btn-discard {
      flex: 1;
      padding: 10px 0;
      border: 1px solid #000;
      background: #fff;
      font: 12px/1 'IBM Plex Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 0.02em;
    }
    #btn-add { background: #000; color: #fff; }
    #btn-add:hover { background: #333; }
    #btn-discard { color: #000; }
    #btn-discard:hover { background: #f5f5f5; }

    /* ── about overlay ── */
    #about-overlay {
      display: none;
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 250;
      background: #fff;
      padding: 40px;
      display: none;
      align-items: flex-start;
      justify-content: flex-start;
    }
    #about-overlay.open { display: flex; }
    #about-content {
      max-width: 720px;
      font: 36px/1.3 'Lora', serif;
      color: #000;
      text-align: left;
    }
    #about-content a {
      color: #000;
      text-decoration: underline;
      text-underline-offset: 4px;
    }
    #about-credit {
      margin-top: 40px;
      font: 14px/1.5 'IBM Plex Sans', sans-serif;
      color: #aaa;
    }

    #footer {
      position: fixed;
      bottom: 16px;
      left: 20px;
      z-index: 100;
      font: 10px/1 'Space Mono', monospace;
      color: #000;
    }

    /* ── mobile ── */
    #mobile-toggle { display: none; }

    @media (max-width: 768px) {
      #scene { right: 0; }

      #header-center { left: 50%; }

      #header-right {
        width: auto;
        flex-shrink: 0;
        padding: 0 16px;
        border-left: none;
        background: transparent !important;
        cursor: default !important;
      }
      #header-right > span { display: none; }
      #gen-close { display: none !important; }

      #mobile-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        background: #000;
        border: none;
        border-radius: 0;
        cursor: pointer;
        color: #fff;
        flex-shrink: 0;
      }
      #mobile-toggle .icon-x { display: none; }

      #header.panel-open #header-center { display: none; }
      #header.panel-open #mobile-toggle {
        background: transparent;
        color: #000;
      }

      #gen-panel {
        width: 100%;
        border-left: none;
        border-top: none;
        padding-bottom: 80px;
        transform: translateY(100%);
      }
      #gen-panel.open { transform: translateY(0); }

      #btn-generate,
      #preview-actions {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
        left: 16px;
        right: 16px;
        height: 44px;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        z-index: 5;
      }

      #btn-generate {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #preview-actions {
        align-items: stretch;
      }

      #btn-add, #btn-discard {
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #preview-img {
        max-height: calc(100dvh - 150px);
        width: auto;
        max-width: 100%;
        margin: 0 auto;
        object-fit: contain;
      }

      #preview-canvas {
        width: min(100%, calc((100dvh - 150px) * 2 / 3));
        height: auto;
        aspect-ratio: 2 / 3;
        margin: 0 auto;
      }

      #about-content { font-size: 28px; }
      #about-overlay { padding: 24px; }
    }

  </style>
</head>
<body>
  <div id="header">
    <button id="header-about">About</button>
    <div id="header-center" style="cursor:pointer;">
      <img src="logo/Favicon.svg" id="header-favicon" alt="">
      <img src="logo/Doodles.svg" alt="doodles">
    </div>
    <div id="header-right">
      <span>Create your own</span>
      <button id="gen-close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/>
        </svg>
      </button>
      <button id="mobile-toggle" aria-label="Create your own">
        <svg class="icon-plus" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="9" y1="3" x2="9" y2="15"/><line x1="3" y1="9" x2="15" y2="9"/>
        </svg>
        <svg class="icon-x" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="scene">
    <div id="world"></div>
  </div>

  <div id="about-overlay">
    <div id="about-content">
      <p>Doodles is an experiment in AI-generated line art. Enter a prompt and watch it become a hand-drawn sketch. Each doodle is generated by <a href="https://reve.art" target="_blank" rel="noopener">Reve</a> and guided by <a href="https://anthropic.com" target="_blank" rel="noopener">Claude</a>. The infinite scroll was inspired by a CSS technique from <a href="https://x.com/nonzeroexitcode" target="_blank" rel="noopener">@nonzeroexitcode</a>.</p>
    </div>
  </div>

  <div id="footer"><a href="https://mary-louise.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">By ML Howell</a> · V1.1 · May 2026</div>

  <div id="gen-panel" class="open">
    <div id="gen-input-row">
      <textarea id="subject" placeholder="Generate your own doodle, ex: a seashell with a heart shaped pearl" autocomplete="off"></textarea>
    </div>
    <button id="btn-generate">Make doodle</button>
    <div id="gen-status"></div>
    <div id="gen-preview">
      <canvas id="preview-canvas"></canvas>
      <img id="preview-img" draggable="false">
    </div>
    <div id="preview-actions">
      <button id="btn-add">Add to doodles</button>
      <button id="btn-discard">Discard</button>
    </div>
  </div>

  <script>
    // ── config ───────────────────────────────────────────────────────────────
    const C = {
      perspective: 790,
      depth:       2400,
      speed:       2.5,
      smoothing:   0.09,
      cols:        4,
      rows:        3,
      spreadX:     1600,
      spreadY:     900,
      jitter:      0,
      imgSize:     220,
      maxRot:      10,
      fadeIn:      0.20,
      fadeOut:     0.08,
    };

    if (window.innerWidth <= 768) {
      C.spreadX = 950;
      C.spreadY = 580;
    }

    const IMAGES = [
      'images/Image 1.svg',  'images/Image 2.svg',
      'images/Image 3.svg',
      'images/Image 5.svg',  'images/Image 6.svg',
      'images/Image 7.svg',  'images/Image 8.svg',
      'images/Image 11.svg', 'images/Image 12.svg',
      'images/Image 13.svg', 'images/Image 14.svg',
      'images/Image 16.svg',
    ];

    const scene = document.getElementById('scene');
    const world = document.getElementById('world');

    let particles  = [];
    let targetZ    = 0;
    let currentZ   = 0;

    // ── particle system ───────────────────────────────────────────────────────
    function buildParticles() {
      world.innerHTML = '';
      particles = [];

      const COUNT = C.cols * C.rows;
      const cellW = (C.spreadX * 2) / C.cols;
      const cellH = (C.spreadY * 2) / C.rows;
      const shuffled = [...IMAGES].sort(() => Math.random() - 0.5);

      for (let i = 0; i < COUNT; i++) {
        const el = document.createElement('div');
        el.className = 'particle';
        applyParticleSize(el);

        const img = document.createElement('img');
        img.src = shuffled[i % shuffled.length];
        img.draggable = false;
        el.appendChild(img);
        world.appendChild(el);

        const col = i % C.cols;
        const row = Math.floor(i / C.cols);
        const cx  = -C.spreadX + cellW * (col + 0.5);
        const cy  = -C.spreadY + cellH * (row + 0.5);

        const p = {
          el,
          img,
          x:           cx,
          y:           cy,
          phase:       i / COUNT,
          rot:         (Math.random() - 0.5) * C.maxRot * 2,
          lastWrapped: null,
        };

        particles.push(p);
      }
    }

    function applyParticleSize(el) {
      el.style.width = C.imgSize + 'px';
      el.style.left  = -(C.imgSize / 2) + 'px';
      el.style.top   = -(C.imgSize * 0.664) + 'px';
    }


    // ── panel ────────────────────────────────────────────────────────────────
    const genPanel    = document.getElementById('gen-panel');
    const genClose    = document.getElementById('gen-close');
    const genStatus   = document.getElementById('gen-status');
    const subjectEl   = document.getElementById('subject');
    const headerRight = document.getElementById('header-right');
    const aboutOverlay = document.getElementById('about-overlay');

    const mobileToggle = document.getElementById('mobile-toggle');
    const headerEl     = document.getElementById('header');
    const headerAbout  = document.getElementById('header-about');

    function setMobileIcon(open) {
      mobileToggle.querySelector('.icon-plus').style.display = open ? 'none' : 'block';
      mobileToggle.querySelector('.icon-x').style.display   = open ? 'block' : 'none';
      if (window.innerWidth <= 768) {
        headerEl.classList.toggle('panel-open', open);
        headerAbout.textContent = open ? 'Create your own' : 'About';
      }
    }
    function openPanel() {
      aboutOverlay.classList.remove('open');
      genPanel.classList.add('open');
      headerRight.classList.remove('closed');
      setMobileIcon(true);
      btnGenerate.classList.toggle('ready', subjectEl.value.trim().length > 0);
    }
    function closePanel() {
      genPanel.classList.remove('open');
      headerRight.classList.add('closed');
      setMobileIcon(false);
    }

    // Start panel closed on mobile
    if (window.innerWidth <= 768) closePanel();

    mobileToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      if (genPanel.classList.contains('open')) { if (pendingImage) hidePreview(); closePanel(); }
      else openPanel();
    });

    genClose.addEventListener('click', (e) => { e.stopPropagation(); if (pendingImage) hidePreview(); closePanel(); });

    document.getElementById('header-center').addEventListener('click', () => {
      aboutOverlay.classList.remove('open');
    });

    document.getElementById('header-about').addEventListener('click', () => {
      closePanel();
      aboutOverlay.classList.add('open');
    });
    headerRight.addEventListener('click', (e) => {
      if (window.innerWidth > 768 && headerRight.classList.contains('closed')) openPanel();
    });

    // ── generate ──────────────────────────────────────────────────────────────
    let generating    = false;
    let ditherRaf     = null;
    let pendingImage  = null;

    const previewEl      = document.getElementById('gen-preview');
    const previewCanvas  = document.getElementById('preview-canvas');
    const previewImg     = document.getElementById('preview-img');
    const previewActions = document.getElementById('preview-actions');
    const btnAdd         = document.getElementById('btn-add');
    const btnDiscard     = document.getElementById('btn-discard');
    const genInputRow    = document.getElementById('gen-input-row');
    const btnGenerate    = document.getElementById('btn-generate');

    subjectEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); triggerGenerate(); }
    });

    subjectEl.addEventListener('input', () => {
      subjectEl.style.height = 'auto';
      subjectEl.style.height = subjectEl.scrollHeight + 'px';
      btnGenerate.classList.toggle('ready', subjectEl.value.trim().length > 0);
    });

    btnGenerate.addEventListener('click', () => {
      if (btnGenerate.classList.contains('ready')) triggerGenerate();
    });

    // ── dither animation ──────────────────────────────────────────────────────
    const BAYER = [
      [ 0,  8,  2, 10],
      [12,  4, 14,  6],
      [ 3, 11,  1,  9],
      [15,  7, 13,  5],
    ];

    function startDither() {
      setStatus('');
      btnGenerate.style.display = 'none';
      if (window.innerWidth <= 768) genInputRow.style.display = 'none';
      const W = 48, H = 72; // small canvas scaled up = chunky squares
      previewCanvas.width  = W;
      previewCanvas.height = H;
      previewCanvas.style.display = 'block';
      previewImg.style.display = 'none';
      previewActions.classList.remove('visible');
      previewEl.classList.add('visible');

      const ctx = previewCanvas.getContext('2d');
      let t = 0;
      function draw() {
        const id = ctx.createImageData(W, H);
        const d  = id.data;
        for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
            const thresh = BAYER[y % 4][x % 4] / 16;
            const wave   = (Math.sin((x + y) / (W + H) * Math.PI * 6 - t) + 1) / 2;
            const v      = wave > thresh ? 255 : 0;
            const i      = (y * W + x) * 4;
            d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
          }
        }
        ctx.putImageData(id, 0, 0);
        t += 0.1;
        ditherRaf = requestAnimationFrame(draw);
      }
      draw();
    }

    function stopDither(imageB64) {
      cancelAnimationFrame(ditherRaf);
      ditherRaf = null;
      pendingImage = `data:image/png;base64,${imageB64}`;
      previewCanvas.style.display = 'none';
      previewImg.src = pendingImage;
      previewImg.style.display = 'block';
      previewActions.classList.add('visible');
      requestAnimationFrame(() => genPanel.scrollTop = genPanel.scrollHeight);
    }

    function hidePreview() {
      if (ditherRaf) { cancelAnimationFrame(ditherRaf); ditherRaf = null; }
      previewEl.classList.remove('visible');
      previewImg.style.display = 'none';
      previewCanvas.style.display = 'block';
      previewActions.classList.remove('visible');
      pendingImage = null;
      btnGenerate.style.display = '';
      btnGenerate.classList.toggle('ready', subjectEl.value.trim().length > 0);
      if (window.innerWidth <= 768) genInputRow.style.display = '';
    }

    btnAdd.addEventListener('click', () => {
      if (pendingImage) {
        IMAGES.push(pendingImage);
        buildParticles();
        fetch('/api/save-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: pendingImage.split(',')[1] }),
        });
      }
      hidePreview();
      setStatus('');
      if (window.innerWidth <= 768) closePanel();
    });

    btnDiscard.addEventListener('click', () => {
      hidePreview();
      setStatus('');
    });

    // ── trigger ───────────────────────────────────────────────────────────────
    async function triggerGenerate() {
      if (generating) return;
      const subject = subjectEl.value.trim();
      if (!subject) { setStatus('enter a subject', true); return; }

      generating = true;
      setStatus('generating…');
      startDither();

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ subject, aspect_ratio: '2:3', version: 'latest' }),
        });

        const data = await res.json();

        if (!res.ok) {
          hidePreview();
          setStatus(data.message || `error ${res.status}`, true);
          return;
        }
        if (data.content_violation) {
          hidePreview();
          setStatus('content policy violation', true);
          return;
        }

        stopDither(data.image);
        subjectEl.value = '';
        setStatus('');

      } catch (err) {
        hidePreview();
        setStatus('request failed', true);
      } finally {
        generating = false;
      }
    }

    function setStatus(msg, isErr = false) {
      genStatus.textContent = msg;
      genStatus.className   = isErr ? 'err' : '';
    }


    // ── scroll ───────────────────────────────────────────────────────────────
    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      targetZ += e.deltaY * C.speed;
    }, { passive: false });

    let lastTouchY = 0;
    window.addEventListener('touchstart',  (e) => { lastTouchY = e.touches[0].clientY; }, { passive: true });
    window.addEventListener('touchmove', (e) => {
      e.preventDefault();
      targetZ   += (lastTouchY - e.touches[0].clientY) * C.speed * 2;
      lastTouchY = e.touches[0].clientY;
    }, { passive: false });

    // ── animation loop ────────────────────────────────────────────────────────
    function tick() {
      currentZ += (targetZ - currentZ) * C.smoothing;

      for (const p of particles) {
        const raw     = p.phase * C.depth + currentZ;
        const wrapped = ((raw % C.depth) + C.depth) % C.depth;
        const z       = wrapped - C.depth;
        const t       = (z + C.depth) / C.depth;

        // Swap image when particle cycles back (while faded out at far end)
        if (p.lastWrapped !== null && wrapped < p.lastWrapped - C.depth * 0.5) {
          p.img.src = IMAGES[Math.floor(Math.random() * IMAGES.length)];
          p.rot = (Math.random() - 0.5) * C.maxRot * 2;
        }
        p.lastWrapped = wrapped;

        let opacity = 1;
        if (C.fadeIn  > 0 && t < C.fadeIn)           opacity = t / C.fadeIn;
        if (C.fadeOut > 0 && t > 1 - C.fadeOut)      opacity = (1 - t) / C.fadeOut;

        p.el.style.transform = `translate3d(${p.x}px,${p.y}px,${z}px) rotate(${p.rot}deg)`;
        p.el.style.opacity   = opacity;
      }

      requestAnimationFrame(tick);
    }

    // ── init ─────────────────────────────────────────────────────────────────
    scene.style.perspective = C.perspective + 'px';
    tick();
    subjectEl.focus();

    fetch('/api/generated-images')
      .then(r => r.json())
      .then(saved => { IMAGES.push(...saved); buildParticles(); })
      .catch(() => buildParticles());
  </script>
</body>
</html>
